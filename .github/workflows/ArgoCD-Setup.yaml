name: Setup ArgoCD Application
on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC
      contents: read    # Required for Checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to your K8s cluster (Generic example for AWS/GCP/Azure)
      - name: Set up Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" > kubeconfig.yaml
          pwd
          export KUBECONFIG=$PWD/kubeconfig.yaml

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest' # Or a specific version like 'v3.12.0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Cluster Connection
        id: verify_cluster
        run: kubectl cluster-info;pwd;
        env:
          # This variable tells Helm/Kubectl where to look
          KUBECONFIG: ./kubeconfig.yaml

      - name: Create Dynamic Overrides
        env:
          # This variable tells Helm/Kubectl where to look
          KUBECONFIG: ./kubeconfig.yaml
        if: success() && steps.verify_cluster.outcome == 'success'
        run: |
            echo "Cluster connection verified. Proceeding with dynamic overrides."
            cd Environments
            envsubst < values-${{ github.event.inputs.environment }}-template.yaml > values-prod.yaml
            cat values-prod.yaml
            pwd;ls -la;
            cd ..
      
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: update image pull secret to Kubernetes
        env:
          # This variable tells Helm/Kubectl where to look
          KUBECONFIG: ./kubeconfig.yaml        
        run: |
          # Use the -f flag to point to the environment-specific values file
          #helm upgrade install --dry-run --debug test .
          helm upgrade --install Argocd ./argo-cd-9.4.15/argo-cd \
            --namespace argocd \
            --create-namespace 
            